server {
    listen 80;
    server_name _;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/mfapi/ {
        auth_basic off;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type";
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass https://api.mfapi.in/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host api.mfapi.in;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type";
    }

    location /api/mfdata/ {
        auth_basic off;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type";
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass https://mfdata.in/;
        proxy_ssl_server_name on;
        proxy_set_header Host mfdata.in;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type";
    }

    location /api/getmfdata/ {
        auth_basic off;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, x-api-key";
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass https://getmfdata.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host getmfdata.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header x-api-key "${GETMFDATA_API_KEY}";
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type, x-api-key";
    }
}
